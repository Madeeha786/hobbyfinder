<!DOCTYPE html>
<html>
<head>
<title>HobbyFinder Chat Assistant</title>

<style>

body{
font-family:Arial;
background:#F4F7F2;
display:flex;
flex-direction:column;
height:100vh;
margin:0;
}

.header{
background:#7A8F73;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

.chatbox{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
margin:10px 0;
max-width:70%;
padding:10px;
border-radius:8px;
}

.user{
background:#CFE2CE;
align-self:flex-end;
}

.bot{
background:#E9EFE7;
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid #ccc;
}

input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-left:10px;
background:#7A8F73;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
HobbyFinder AI Assistant
</div>

<div id="chatbox" class="chatbox"></div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Ask for recommendations..."
>

<button onclick="sendMessage()">Send</button>

</div>

<script>

async function sendMessage(){

let input = document.getElementById("userInput");
let message = input.value;

if(message==="") return;

addMessage(message,"user");

input.value="";

const response = await fetch("http://127.0.0.1:8000/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
});

const data = await response.json();

addMessage(data.reply,"bot");

}

function addMessage(text,type){

const chatbox = document.getElementById("chatbox");

const div = document.createElement("div");
div.className="message "+type;
div.innerText=text;

chatbox.appendChild(div);

chatbox.scrollTop = chatbox.scrollHeight;

}

</script>

</body>
</html>
