<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | HobbyFinder</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Specific layout to perfectly center the auth card */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--cream-bg);
            margin: 0;
            background-image: radial-gradient(var(--light-sage) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid var(--sage-green);
        }

        .auth-container h1 {
            color: var(--earth-brown);
            text-align: center;
            margin-bottom: 5px;
            font-size: 28px;
        }

        .auth-container p.subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 25px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--sage-green);
            box-shadow: 0 0 5px rgba(157, 193, 131, 0.3);
        }

        #errorMessage {
            color: #d9534f;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            display: none; /* Hidden by default */
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-light);
        }

        .auth-footer a {
            color: var(--earth-brown);
            text-decoration: none;
            font-weight: bold;
        }

        .auth-footer a:hover {
            color: var(--light-brown);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1>Join HobbyFinder</h1>
        <p class="subtitle">Create an account to start discovering.</p>

        <div id="errorMessage"></div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Explorer123" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="explorer@hobbyfinder.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" class="btn-primary" id="submitBtn" style="margin-top: 10px;">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        async function handleSignup(event) {
            event.preventDefault(); // Stop default form submission

            // 1. Grab DOM elements
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');

            // 2. Reset UI state
            errorDiv.style.display = 'none';
            submitBtn.innerText = 'Creating...';
            submitBtn.disabled = true;

            try {
                // 3. Connect to your actual Node.js Backend 
                // (Adjust the port if your backend runs on something other than 5000)
                const response = await fetch('http://localhost:5000/api/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // 4. Success: Save token and redirect to interests page
                    localStorage.setItem('token', data.token); // Save the JWT token
                    localStorage.setItem('username', data.username); // Save username for dashboard
                    
                    // Redirect new users to pick their initial interests
                    window.location.href = 'interests.html'; 
                } else {
                    // 5. Backend Error: Show the error message from the server
                    errorDiv.innerText = data.message || 'Registration failed. Please try again.';
                    errorDiv.style.display = 'block';
                    submitBtn.innerText = 'Create Account';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                // 6. Network Error (e.g., backend is not running)
                console.error('Error during signup:', err);
                errorDiv.innerText = 'Cannot connect to the server. Is the backend running?';
                errorDiv.style.display = 'block';
                submitBtn.innerText = 'Create Account';
                submitBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
