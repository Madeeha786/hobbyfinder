<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | HobbyFinder</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .chat-container {
            background: white;
            border-radius: 12px;
            height: 70vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-top: 6px solid var(--sage-green);
            overflow: hidden;
        }

        .chat-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--cream-bg);
            border-bottom: 1px solid #eee;
        }

        .chat-header-bar h2 {
            margin: 0;
            font-size: 20px;
            color: var(--earth-brown);
        }

        .btn-secondary {
            background: transparent;
            color: var(--earth-brown);
            border: 2px solid var(--earth-brown);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--earth-brown);
            color: white;
        }

        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg-bubble {
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 75%;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bot-msg {
            background: var(--light-sage);
            color: var(--earth-brown);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user-msg {
            background: var(--earth-brown);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .chat-input-area {
            display: flex;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        .chat-input-area input {
            flex-grow: 1;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: var(--sage-green);
        }

        .chat-input-area button {
            width: auto;
            margin: 0;
            padding: 12px 25px;
        }

        .typing-indicator {
            font-style: italic;
            color: var(--text-light);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand">HobbyFinder</div>
        <a href="dashboard.html">📍 Discover</a>
        <a href="chatbot.html" class="active">🤖 AI Assistant</a>
        <a href="recommendations.html">⭐ Saved Picks</a>
        <a href="profile.html">👤 My Profile</a>
        <a href="#" class="logout" onclick="logout()">🚪 Logout</a>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1>AI Curation Assistant</h1>
            <p>Tell me what you're in the mood for, and I'll semantically search the database.</p>
        </div>

        <div class="chat-container">
            <div class="chat-header-bar">
                <h2>Current Thread</h2>
                <button class="btn-secondary" onclick="startNewThread()">+ New Thread</button>
            </div>
            
            <div class="chat-history" id="chatHistory">
                </div>
            
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="E.g., I want a book similar to Blade Runner..." onkeypress="handleKeyPress(event)">
                <button class="btn-primary" onclick="sendMessage()" id="sendBtn">Send</button>
            </div>
        </div>
    </main>
     
    <script>
        const chatHistoryDOM = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Get the unique user ID generated by MongoDB during signup
        const userId = localStorage.getItem('user_id');
        
        // If not logged in, redirect to signup
        if (!userId) {
            window.location.href = 'signup.html';
        }

        // Create a unique storage key for this specific user
        const chatStorageKey = `hobbyfinder_chat_${userId}`;

        const defaultGreeting = "Hi there! I'm your AI Curation Assistant. Tell me what kind of book, movie, or music you are looking for today!";

        document.addEventListener('DOMContentLoaded', () => {
            loadChatHistory();
        });

        function loadChatHistory() {
            chatHistoryDOM.innerHTML = '';
            // Use the user-specific storage key
            const savedHistory = JSON.parse(localStorage.getItem(chatStorageKey)) || [];
            
            if (savedHistory.length === 0) {
                appendMessageToDOM('bot', defaultGreeting);
                saveMessageToLocal('bot', defaultGreeting);
            } else {
                savedHistory.forEach(msg => appendMessageToDOM(msg.sender, msg.text));
            }
            scrollToBottom();
        }

        function startNewThread() {
            // Only clear this specific user's chat
            localStorage.removeItem(chatStorageKey);
            loadChatHistory();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            appendMessageToDOM('user', message);
            saveMessageToLocal('user', message);
            scrollToBottom();

            const typingId = 'typing-' + Date.now();
            appendMessageToDOM('bot', '<span class="typing-indicator">Searching the database...</span>', typingId);
            scrollToBottom();

            try {
                const response = await fetch('http://localhost:5000/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error("Failed to connect to backend");
                const data = await response.json();
                document.getElementById(typingId).remove();

                let botReply = '';
                if (data.recommendations && data.recommendations.length > 0) {
                    botReply = 'Here are the best matches from the catalog:<br><br>';
                    data.recommendations.forEach((item) => {
                        const score = Math.round(item.score * 100);
                        const icon = item.type === 'movie' ? '🎬' : item.type === 'book' ? '📚' : '🎵';
                        botReply += `${icon} <strong>${item.title}</strong> - ${score}% Match<br>`;
                    });
                } else {
                    botReply = "I couldn't find any close matches for that description. Could you try rephrasing?";
                }

                appendMessageToDOM('bot', botReply);
                saveMessageToLocal('bot', botReply);

            } catch (err) {
                console.error(err);
                document.getElementById(typingId).remove();
                appendMessageToDOM('bot', "⚠️ Error: Cannot reach the backend.");
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                scrollToBottom();
            }
        }

        function appendMessageToDOM(sender, text, id = null) {
            const div = document.createElement('div');
            div.className = `msg-bubble ${sender}-msg`;
            div.innerHTML = text;
            if (id) div.id = id;
            chatHistoryDOM.appendChild(div);
        }

        function saveMessageToLocal(sender, text) {
            // Save to the user-specific storage key
            const history = JSON.parse(localStorage.getItem(chatStorageKey)) || [];
            history.push({ sender, text });
            localStorage.setItem(chatStorageKey, JSON.stringify(history));
        }

        function scrollToBottom() {
            chatHistoryDOM.scrollTop = chatHistoryDOM.scrollHeight;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'signup.html';
        }
    </script>
    
</body>
</html>
