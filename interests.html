<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HobbyFinder - Select Interests</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#9CAF88,#7A8F73);
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:#F4F7F2;
    padding:40px;
    border-radius:12px;
    width:520px;
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    color:#4F6F52;
    margin-bottom:8px;
}

.subtitle{
    color:#6B7F6B;
    margin-bottom:25px;
}

.categories{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.category{
    flex:1;
    margin:0 5px;
    padding:12px;
    border-radius:8px;
    border:1px solid #C7D3C3;
    background:white;
    cursor:pointer;
    transition:0.2s;
}

.category:hover{
    background:#E8EFE5;
}

.category.active{
    background:#7A8F73;
    color:white;
    border:none;
}

.genre-frame{
    display:none;
    margin-top:15px;
    padding:20px;
    background:white;
    border-radius:10px;
    border:1px solid #C7D3C3;
}

.genre-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.genre{
    padding:8px;
    border-radius:6px;
    border:1px solid #C7D3C3;
    cursor:pointer;
    font-size:14px;
}

.genre:hover{
    background:#E8EFE5;
}

.genre.selected{
    background:#7A8F73;
    color:white;
    border:none;
}

button{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:6px;
    background:#7A8F73;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#657B5F;
}

</style>
</head>

<body>

<div class="container">

<h1>Select Your Interests</h1>
<p class="subtitle">Choose categories and genres you enjoy</p>

<div class="categories">

<div class="category" onclick="showGenres('books', this)">Books</div>
<div class="category" onclick="showGenres('movies', this)">Movies</div>
<div class="category" onclick="showGenres('songs', this)">Songs</div>

</div>

<div id="genreFrame" class="genre-frame">
    <div id="genreGrid" class="genre-grid"></div>
</div>

<button onclick="submitSelections()">Continue</button>

</div>

<script>

const genres = {

books:[
"Fantasy",
"Mystery",
"Sci-Fi",
"Romance",
"Thriller",
"Adventure",
"Historical",
"Young Adult",
"Drama"
],

movies:[
"Action",
"Comedy",
"Sci-Fi",
"Horror",
"Adventure",
"Drama",
"Mystery",
"Fantasy",
"Romance"
],

songs:[
"Pop",
"Rock",
"Jazz",
"Classical",
"Ambient",
"Hip Hop",
"Lo-Fi",
"Electronic",
"Indie"
]

};

let selectedGenres = {};

function showGenres(type, element){

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"));
element.classList.add("active");

const frame = document.getElementById("genreFrame");
const grid = document.getElementById("genreGrid");

frame.style.display="block";
grid.innerHTML="";

genres[type].forEach(g=>{

const div = document.createElement("div");
div.className="genre";
div.innerText=g;

div.onclick=()=>{
div.classList.toggle("selected");

if(!selectedGenres[type]) selectedGenres[type]=[];

if(selectedGenres[type].includes(g)){
selectedGenres[type]=selectedGenres[type].filter(x=>x!==g);
}else{
selectedGenres[type].push(g);
}

};

grid.appendChild(div);

});

}

function submitSelections(){

console.log(selectedGenres);

/* Later send to backend */

fetch("http://localhost:5000/api/interests",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(selectedGenres)
});

alert("Interests saved!");

}

</script>

</body>
</html>
